<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>nyxenfx</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent: #7df9c8;
      --accent2: #5b8cff;
      --text: #e8eaf0;
      --muted: #8892aa;
      --glass: rgba(8, 10, 15, 0.72);
      --glass-border: rgba(255,255,255,0.08);
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Mono', monospace;
      color: var(--text);
      overflow-x: hidden;
      position: relative;
    }

    /* ── GIF BACKGROUND ─────────────────────────────
       Replace YOUR_GIF_URL_HERE with your gif link
       e.g. https://i.imgur.com/abcd1234.gif
    ─────────────────────────────────────────────── */
    #bg-gif {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
      filter: brightness(0.4);
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.3);
      z-index: 1;
      pointer-events: none;
    }

    .container {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 420px;
      padding: 2rem 1.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.4rem;
      animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── AVATAR ── */
    .avatar-wrap {
      position: relative;
      width: 94px;
      height: 94px;
    }

    .avatar-ring {
      position: absolute;
      inset: -3px;
      border-radius: 50%;
      background: conic-gradient(var(--accent), var(--accent2), var(--accent));
      animation: spin 4s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── PROFILE PIC ─────────────────────────────────
       Replace YOUR_PROFILE_PIC_URL_HERE with your image
       e.g. https://i.imgur.com/yourpic.jpg
    ─────────────────────────────────────────────── */
    .avatar-img {https://cdn.discordapp.com/attachments/1252673862513197096/1497762900272746627/9183796.webp?ex=69eeb3e6&is=69ed6266&hm=87ae702494b4e1572bb8098993b682b7459791c38f46b3f7c67c40107a5956d9&
      position: absolute;
      inset: 3px;
      border-radius: 50%;
      object-fit: cover;
      width: calc(100% - 6px);
      height: calc(100% - 6px);
    }

    .avatar-fallback {
      position: absolute;
      inset: 3px;
      border-radius: 50%;
      background: #0e1117;
      display: none;
      align-items: center;
      justify-content: center;
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.5rem;
      color: var(--accent);
    }

    .name {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 2rem;
      letter-spacing: -1px;
      text-align: center;
    }

    .tag {
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      text-align: center;
      margin-top: 0.25rem;
    }

    /* ── LINKS BOX ── */
    .links-box {
      width: 100%;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      overflow: hidden;
    }

    .link-btn {
      display: flex;
      align-items: center;
      gap: 0.9rem;
      padding: 0.95rem 1.2rem;
      text-decoration: none;
      color: var(--text);
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.9rem;
      border-bottom: 1px solid var(--glass-border);
      transition: background 0.2s;
      position: relative;
    }

    .link-btn:last-child { border-bottom: none; }
    .link-btn:hover { background: rgba(255,255,255,0.05); }

    .link-btn::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: var(--lc, var(--accent));
      opacity: 0;
      transition: opacity 0.2s;
      border-radius: 0 2px 2px 0;
    }
    .link-btn:hover::before { opacity: 1; }

    .link-btn .icon {
      width: 32px; height: 32px;
      border-radius: 8px;
      background: rgba(255,255,255,0.07);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .link-btn .icon svg { width: 17px; height: 17px; }
    .link-btn .label { flex: 1; }
    .link-btn .arrow {
      color: var(--muted);
      transition: transform 0.2s, color 0.2s;
    }
    .link-btn:hover .arrow { transform: translateX(3px); color: var(--lc, var(--accent)); }

    .tiktok  { --lc: #ffffff; }
    .youtube { --lc: #ff4444; }
    .discord { --lc: #7289da; }
    .payhip  { --lc: #f5a623; }

    /* ── MUSIC PLAYER ── */
    .player {
      width: 100%;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 1rem 1.2rem;
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
    }

    .player-top {
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }

    .player-art {
      width: 44px; height: 44px;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .player-art svg { width: 20px; height: 20px; color: #000; }
    .player-art.spinning { animation: discSpin 3s linear infinite; }
    @keyframes discSpin { to { transform: rotate(360deg); } }

    .player-info { flex: 1; min-width: 0; }
    .player-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.85rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .player-artist { font-size: 0.7rem; color: var(--muted); margin-top: 0.15rem; }

    .play-btn {
      width: 38px; height: 38px;
      border-radius: 50%;
      border: none;
      background: var(--accent);
      color: #000;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: transform 0.15s;
    }
    .play-btn:hover { transform: scale(1.08); }
    .play-btn svg { width: 16px; height: 16px; }

    .progress-bar-track {
      width: 100%;
      height: 4px;
      background: rgba(255,255,255,0.1);
      border-radius: 99px;
      cursor: pointer;
      position: relative;
    }
    .progress-bar-fill {
      height: 100%;
      border-radius: 99px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      width: 0%;
      pointer-events: none;
    }
    .progress-times {
      display: flex;
      justify-content: space-between;
      font-size: 0.65rem;
      color: var(--muted);
      margin-top: 0.3rem;
    }

    .footer {
      font-size: 0.6rem;
      color: rgba(255,255,255,0.18);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <div class="container">

      ═══════════════════════════════════════════ -->
      <img class="avatar-img" id="pfp"
           src="YOUR_PROFILE_PIC_URL_HERE"

           onerror="this.style.display='none';document.getElementById('pfp-fb').style.display='flex';" />
      <div class="avatar-fallback" id="pfp-fb">nx</div>

    <!-- ALL LINKS IN ONE BOX -->
    <div class="links-box">

      <a class="link-btn tiktok" href="https://www.tiktok.com/@nyxenfx" target="_blank" rel="noopener">

      </a>

      <a class="link-btn youtube" href="https://www.youtube.com/@nyxenfxs" target="_blank" rel="noopener">
        <div class="icon">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>

    </div>

    <!-- MUSIC PLAYER -->
    <div class="player">
      <div class="player-top">
        <div class="player-art" id="disc">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
        </div>
        <div class="player-info">
          <!-- Change these to your song & artist name -->
          <div class="player-title" id="song-title">Poem</div>
          <div class="player-artist" id="song-artist">OverTonight</div>
        </div>
        <button class="play-btn" id="play-btn" onclick="togglePlay()">
          <svg id="icon-play" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
          <svg id="icon-pause" viewBox="0 0 24 24" fill="currentColor" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
        </button>
      </div>

      <div>
        <div class="progress-bar-track" id="track" onclick="seek(event)">
          <div class="progress-bar-fill" id="fill"></div>
        </div>
        <div class="progress-times">
          <span id="cur">0:00</span>
          <span id="dur">0:00</span>
        </div>
      </div>
    </div>

    <div class="footer">nyxenfx · all links</div>
  </div>

  <script>
    const audio     = document.getElementById('audio');
    const fill      = document.getElementById('fill');
    const curEl     = document.getElementById('cur');
    const durEl     = document.getElementById('dur');
    const iconPlay  = document.getElementById('icon-play');
    const iconPause = document.getElementById('icon-pause');
    const disc      = document.getElementById('disc');

    function fmt(s) {
      if (isNaN(s)) return '0:00';
      const m = Math.floor(s / 60);
      const sec = Math.floor(s % 60).toString().padStart(2, '0');
      return `${m}:${sec}`;
    }

    audio.addEventListener('loadedmetadata', () => {
      durEl.textContent = fmt(audio.duration);
    });

    audio.addEventListener('timeupdate', () => {
      if (!audio.duration) return;
      fill.style.width = (audio.currentTime / audio.duration * 100) + '%';
      curEl.textContent = fmt(audio.currentTime);
    });

    audio.addEventListener('ended', () => {
      iconPlay.style.display = '';
      iconPause.style.display = 'none';
      disc.classList.remove('spinning');
    });

    function togglePlay() {
      if (audio.paused) {
        audio.play();
        iconPlay.style.display = 'none';
        iconPause.style.display = '';
        disc.classList.add('spinning');
      } else {
        audio.pause();
        iconPlay.style.display = '';
        iconPause.style.display = 'none';
        disc.classList.remove('spinning');
      }
    }

    function seek(e) {
      const rect = document.getElementById('track').getBoundingClientRect();
      audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration;
    }
  </script>
