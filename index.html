<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>nyxenfx</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent: #7df9c8;
      --accent2: #5b8cff;
      --text: #e8eaf0;
      --muted: #8892aa;
      --glass: rgba(8, 10, 15, 0.72);
      --glass-border: rgba(255,255,255,0.08);
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Mono', monospace;
      color: var(--text);
      overflow-x: hidden;
      position: relative;
    }

    #bg-gif {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
      filter: brightness(0.4);
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.3);
      z-index: 1;
      pointer-events: none;
    }

    .container {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 420px;
      padding: 2rem 1.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.4rem;
      animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    
    .avatar-wrap {
      position: relative;
      width: 94px;
      height: 94px;
    }

    .avatar-ring {
      position: absolute;
      inset: -3px;
      border-radius: 50%;
      background: conic-gradient(var(--accent), var(--accent2), var(--accent));
      animation: spin 4s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .avatar-img {
      position: absolute;
      inset: 3px;
      border-radius: 50%;
      object-fit: cover;
      width: calc(100% - 6px);
      height: calc(100% - 6px);
      background: #0e1117;
    }

    .avatar-fallback {
      position: absolute;
      inset: 3px;
      border-radius: 50%;
      background: #0e1117;
      display: none;
      align-items: center;
      justify-content: center;
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.5rem;
      color: var(--accent);
    }

   
    .name {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 2rem;
      letter-spacing: -1px;
      text-align: center;
    }

    .tag {
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      text-align: center;
      margin-top: 0.25rem;
    }

    
    .links-box {
      width: 100%;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      overflow: hidden;
    }

    .link-btn {
      display: flex;
      align-items: center;
      gap: 0.9rem;
      padding: 0.95rem 1.2rem;
      text-decoration: none;
      color: var(--text);
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.9rem;
      border-bottom: 1px solid var(--glass-border);
      transition: background 0.2s, transform 0.2s;
      position: relative;
    }

    .link-btn:last-child { border-bottom: none; }
    .link-btn:hover { background: rgba(255,255,255,0.05); transform: scale(0.97); }

    .link-btn .label {
      text-shadow: 0 0 8px rgba(255,255,255,0.9), 0 0 20px rgba(255,255,255,0.5);
      color: #fff;
    }

    .link-btn::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: var(--lc, var(--accent));
      opacity: 0;
      transition: opacity 0.2s;
      border-radius: 0 2px 2px 0;
    }
    .link-btn:hover::before { opacity: 1; }

    .link-btn .icon {
      width: 32px; height: 32px;
      border-radius: 8px;
      background: rgba(255,255,255,0.07);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      overflow: hidden;
    }
    .link-btn .icon svg { width: 17px; height: 17px; }
    .link-btn .icon img { width: 100%; height: 100%; object-fit: cover; border-radius: 8px; }
    .link-btn .label { flex: 1; }
    .link-btn .arrow { color: var(--muted); transition: transform 0.2s, color 0.2s; }
    .link-btn:hover .arrow { transform: translateX(3px); color: var(--lc, var(--accent)); }

    .tiktok  { --lc: #ffffff; }
    .youtube { --lc: #ff4444; }
    .discord { --lc: #7289da; }
    .payhip  { --lc: #f5a623; }

   
    .player {
      width: 100%;
      background: transparent;
      border: none;
      border-radius: 16px;
      padding: 1rem 1.2rem;
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }

    .player-art {
      width: 44px; height: 44px;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
      position: relative;
    }
    .player-art svg { width: 20px; height: 20px; color: #000; }
    .player-art img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .player-art.spinning { animation: discSpin 3s linear infinite; }
    @keyframes discSpin { to { transform: rotate(360deg); } }

    .player-mid {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 0.45rem;
    }

    .player-meta {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      min-width: 0;
    }

    .player-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.85rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .player-sep { color: var(--muted); font-size: 0.8rem; }

    .player-artist {
      font-size: 0.72rem;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .player-bar-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .player-time {
      font-size: 0.62rem;
      color: var(--muted);
      flex-shrink: 0;
      min-width: 28px;
    }

    .player-time.right { text-align: right; }

    .progress-bar-track {
      flex: 1;
      height: 4px;
      background: rgba(255,255,255,0.1);
      border-radius: 99px;
      cursor: pointer;
      position: relative;
    }

    .progress-bar-fill {
      height: 100%;
      border-radius: 99px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      width: 0%;
      pointer-events: none;
      transition: width 0.1s linear;
    }

    
    .player-controls {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      flex-shrink: 0;
    }

    .play-btn {
      width: 38px; height: 38px;
      border-radius: 50%;
      border: none;
      background: var(--accent);
      color: #000;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.15s;
    }
    .play-btn:hover { transform: scale(1.08); }
    .play-btn svg { width: 16px; height: 16px; }

    .ctrl-btn {
      width: 30px; height: 30px;
      border-radius: 50%;
      border: none;
      background: rgba(255,255,255,0.07);
      color: var(--muted);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, color 0.2s;
    }
    .ctrl-btn:hover { background: rgba(255,255,255,0.12); color: var(--text); }
    .ctrl-btn svg { width: 16px; height: 16px; }

    .footer {
      font-size: 0.6rem;
      color: rgba(255,255,255,0.18);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <img id="bg-gif" src="https://media1.tenor.com/m/nxf-w43qX1sAAAAC/gif-de-amor.gif" alt="" />

  <audio id="audio" preload="metadata">
    <source src="https://files.catbox.moe/kmqnmw.mp3" type="audio/mpeg" />
  </audio>

  <div class="container">

    <div class="avatar-wrap">
      <div class="avatar-ring"></div>
      <img class="avatar-img" id="pfp"
           src="https://i.imgur.com/WZmUc4E.jpeg"
           alt="nyxenfx"
           onerror="this.style.display='none';document.getElementById('pfp-fb').style.display='flex';" />
      <div class="avatar-fallback" id="pfp-fb">nx</div>
    </div>

    <div>
      <div class="name">nyxenfx</div>
      <div class="tag">Editor</div>
    </div>

    <div class="links-box">

      <a class="link-btn tiktok" href="https://www.tiktok.com/@nyxenfx" target="_blank" rel="noopener">
        <div class="icon">
          <img src="https://i.imgur.com/kEO93w6.jpeg" alt="tiktok" onerror="this.style.opacity='0'" />
        </div>
        <span class="label">TikTok</span>
        <span class="arrow">→</span>
      </a>

      <a class="link-btn youtube" href="https://www.youtube.com/@nyxenfxs" target="_blank" rel="noopener">
        <div class="icon">
          <img src="https://i.imgur.com/hD4RvQ1.png" alt="youtube" onerror="this.style.opacity='0'" />
        </div>
        <span class="label">YouTube</span>
        <span class="arrow">→</span>
      </a>

      <a class="link-btn discord" href="https://discord.gg/tErbJB86ye" target="_blank" rel="noopener">
        <div class="icon">
          <img src="https://i.imgur.com/iLaGN1o.jpeg" alt="discord" onerror="this.style.opacity='0'" />
        </div>
        <span class="label">Discord Server</span>
        <span class="arrow">→</span>
      </a>

      <a class="link-btn payhip" href="https://payhip.com/nyxenfx" target="_blank" rel="noopener">
        <div class="icon">
          <img src="https://i.imgur.com/jiq0aTb.jpeg" alt="payhip" onerror="this.style.opacity='0'" />
        </div>
        <span class="label">Payhip Store</span>
        <span class="arrow">→</span>
      </a>

    </div>

    
    <div class="player">

      <div class="player-art" id="disc">
        
        <img src="https://i.imgur.com/8soBenV.png" alt="cover"
             onerror="this.style.display='none'" />
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
      </div>

      <div class="player-mid">
        <div class="player-meta">
          <div class="player-title" id="song-title">Poem</div>
          <span class="player-sep">·</span>
          <div class="player-artist" id="song-artist">OverTonight</div>
        </div>
        <div class="player-bar-row">
          <span class="player-time" id="cur">0:00</span>
          <div class="progress-bar-track" id="track" onclick="seek(event)">
            <div class="progress-bar-fill" id="fill"></div>
          </div>
          <span class="player-time right" id="dur">0:00</span>
        </div>
      </div>

      <div class="player-controls">
        <button class="ctrl-btn" onclick="skipBack()" title="Back 10s">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M11.99 5V1l-5 5 5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6h-2c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/></svg>
        </button>
        <button class="play-btn" id="play-btn" onclick="togglePlay()">
          <svg id="icon-play" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
          <svg id="icon-pause" viewBox="0 0 24 24" fill="currentColor" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
        </button>
        <button class="ctrl-btn" onclick="skipForward()" title="Forward 10s">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12.01 5V1l5 5-5 5V7c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6h2c0 4.42-3.58 8-8 8s-8-3.58-8-8 3.58-8 8-8z"/></svg>
        </button>
      </div>

    </div>

    <div class="footer">nyxenfx · all links</div>
  </div>

  <script>
    const audio     = document.getElementById('audio');
    const fill      = document.getElementById('fill');
    const curEl     = document.getElementById('cur');
    const durEl     = document.getElementById('dur');
    const iconPlay  = document.getElementById('icon-play');
    const iconPause = document.getElementById('icon-pause');
    const disc      = document.getElementById('disc');

    function fmt(s) {
      if (isNaN(s)) return '0:00';
      const m = Math.floor(s / 60);
      const sec = Math.floor(s % 60).toString().padStart(2, '0');
      return `${m}:${sec}`;
    }

    audio.addEventListener('loadedmetadata', () => {
      durEl.textContent = fmt(audio.duration);
    });

    audio.addEventListener('timeupdate', () => {
      if (!audio.duration) return;
      fill.style.width = (audio.currentTime / audio.duration * 100) + '%';
      curEl.textContent = fmt(audio.currentTime);
    });

    audio.addEventListener('ended', () => {
      iconPlay.style.display = '';
      iconPause.style.display = 'none';
      disc.classList.remove('spinning');
    });

    function togglePlay() {
      if (audio.paused) {
        audio.play();
        iconPlay.style.display = 'none';
        iconPause.style.display = '';
        disc.classList.add('spinning');
      } else {
        audio.pause();
        iconPlay.style.display = '';
        iconPause.style.display = 'none';
        disc.classList.remove('spinning');
      }
    }

   
    const track = document.getElementById('track');
    let scrubbing = false;

    function getScrubPos(e) {
      const rect = track.getBoundingClientRect();
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      return Math.min(1, Math.max(0, (clientX - rect.left) / rect.width));
    }

    function applyScrub(e) {
      if (!audio.duration) return;
      audio.currentTime = getScrubPos(e) * audio.duration;
    }

    track.addEventListener('mousedown',  e => { scrubbing = true; applyScrub(e); });
    track.addEventListener('touchstart', e => { scrubbing = true; applyScrub(e); }, { passive: true });
    window.addEventListener('mousemove',  e => { if (scrubbing) applyScrub(e); });
    window.addEventListener('touchmove',  e => { if (scrubbing) applyScrub(e); }, { passive: true });
    window.addEventListener('mouseup',   () => { scrubbing = false; });
    window.addEventListener('touchend',  () => { scrubbing = false; });

    function skipBack()    { audio.currentTime = Math.max(0, audio.currentTime - 10); }
    function skipForward() { audio.currentTime = Math.min(audio.duration || 0, audio.currentTime + 10); }

    
    window.addEventListener('load', () => {
      const tryPlay = audio.play();
      if (tryPlay !== undefined) {
        tryPlay.then(() => {
          iconPlay.style.display = 'none';
          iconPause.style.display = '';
          disc.classList.add('spinning');
        }).catch(() => {  });
      }
    });
  </script>

</body>
</html>
